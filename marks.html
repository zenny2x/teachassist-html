        function drawGeneralData(container, translations, data) {

        }
        function drawProgressCircle(container, percent, translations) {
            const numTicks = 70
            const radius = 38
            const circle = document.createElement("div")
            let text;
            if (!percent) {
                percent = 0
                text = "N/A"
            } else {
                text = percent + "%"
            }

            circle.style.width = radius * 2 + 'px'
            circle.style.height = radius * 2 + 'px'
            circle.style.display = 'flex'
            circle.style.justifyContent = 'center'
            circle.style.alignItems = 'center'
            circle.style.background = 'rgba(0,0,0,0)'
            circle.style.position = 'absolute'
            circle.style.left = translations.x + 'px'
            circle.style.top = translations.y + 'px'
            circle.style.transform = 'translate(-50%, -50%)'
            container.append(circle)
            for (let i = 0; i < numTicks; i++) {
                const angle = (i / numTicks) * 2 * Math.PI
                const x = radius * Math.cos(angle)
                const y = radius * Math.sin(angle)
                const tick = document.createElement("div")
                tick.style.position = 'absolute'
                tick.style.left = x + radius + 'px'
                tick.style.top = y + radius + 'px'
                tick.style.width = '17px'
                tick.style.height = '2px'
                tick.style.borderRadius = '15px'
                tick.style.background = i < Math.round((percent / 100) * numTicks) ? '#47B999' : '#444'

            }
